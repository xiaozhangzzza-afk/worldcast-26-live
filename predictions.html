<!doctype html>
<html lang="zh-CN" data-theme="standard">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>世界杯比赛预测｜足球预测大模型</title>
  <meta name="description" content="足球预测大模型预测中心展示全部比赛预测、日期和阶段筛选、比赛搜索、胜平负概率、比分预测、比分频次与模型观察。">
  <meta name="keywords" content="世界杯比赛预测, 胜平负概率, 比分预测, 足球预测大模型">
  <meta name="robots" content="index,follow,max-image-preview:large">
  <meta name="theme-color" content="#0b1724">
  <link rel="canonical" href="https://xiaozhangzzza-afk.github.io/worldcast-26-live/predictions.html">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="assets/app-icon.svg" type="image/svg+xml">
  <meta property="og:title" content="世界杯比赛预测｜足球预测大模型">
  <meta property="og:description" content="查看全部比赛预测、胜平负概率、比分区间和模型观察。">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://xiaozhangzzza-afk.github.io/worldcast-26-live/predictions.html">
  <meta property="og:image" content="https://xiaozhangzzza-afk.github.io/worldcast-26-live/assets/img/og-cover.svg">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="stylesheet" href="assets/css/style.css?v=4.0.1">
</head>
<body data-page="predictions">
  <a class="skip-link" href="#main">跳到主要内容</a>
  <header class="site-header" data-site-header></header>
  <main id="main">
    <section class="sub-hero">
      <div class="section-shell">
        <p class="eyebrow">Prediction Center</p>
        <h1>世界杯比赛预测</h1>
        <p>集中查看全部比赛预测、胜平负概率、比分区间、模型观察和比分分布。演示数据仅用于产品原型。</p>
      </div>
    </section>

    <section class="section-block block-dark">
      <div class="section-shell">
        <div class="section-heading">
          <span class="section-index">01</span>
          <div><h2>全部比赛预测</h2><p>支持日期、阶段和球队搜索。</p></div>
        </div>
        <div class="filter-panel">
          <div class="stage-filter" id="dateFilter" role="group" aria-label="日期筛选">
            <button class="active" type="button" data-date="all">全部</button>
            <button type="button" data-date="today">今天</button>
            <button type="button" data-date="tomorrow">明天</button>
            <button type="button" data-date="later">后续</button>
          </div>
          <div class="stage-filter" id="stageFilter" role="group" aria-label="阶段筛选">
            <button class="active" type="button" data-stage="all">全部阶段</button>
            <button type="button" data-stage="group">小组赛</button>
            <button type="button" data-stage="r32">32强</button>
            <button type="button" data-stage="r16">16强</button>
            <button type="button" data-stage="qf">1/4决赛</button>
            <button type="button" data-stage="sf">半决赛</button>
            <button type="button" data-stage="final">决赛</button>
          </div>
          <label class="search-field"><span class="sr-only">搜索比赛</span><input id="predictionSearch" type="search" placeholder="搜索球队、阶段或场地" aria-label="搜索球队、阶段或场地"></label>
        </div>
        <div class="match-grid" id="predictionGrid"></div>
      </div>
    </section>

    <section class="section-block block-light" aria-labelledby="scoreTitle">
      <div class="section-shell">
        <div class="section-heading dark-heading">
          <span class="section-index">02</span>
          <div><h2 id="scoreTitle">比分频次与模型分布</h2><p>浅色数据区块使用深色文字，降低长时间浏览疲劳。</p></div>
        </div>
        <div class="score-layout" id="scoreDistribution"></div>
      </div>
    </section>

    <section class="section-block block-gradient" id="model-watch">
      <div class="section-shell">
        <div class="section-heading">
          <span class="section-index">03</span>
          <div><h2>模型观察</h2><p>展示置信度、理由和风险边界，不承诺赛果。</p></div>
        </div>
        <div class="insight-grid" id="modelInsightGrid"></div>
      </div>
    </section>
  </main>
  <footer class="site-footer" data-site-footer></footer>
  <div class="modal" id="matchModal" role="dialog" aria-modal="true" aria-labelledby="matchModalTitle" aria-hidden="true" hidden>
    <div class="modal-backdrop" data-close-modal></div>
    <section class="modal-panel" tabindex="-1">
      <button class="modal-close" type="button" aria-label="关闭" data-close-modal>关闭</button>
      <div id="matchModalContent"></div>
    </section>
  </div>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="assets/js/data.js?v=4.0.1" defer></script>
  <script src="assets/js/data-service.js?v=4.0.1" defer></script>
  <script src="assets/js/common.js?v=4.0.1" defer></script>
  <script src="assets/js/predictions.js?v=4.0.1" defer></script>
</body>
</html>
